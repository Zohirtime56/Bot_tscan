<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cloud Mining Pro — واجهة متطورة</title>

  <!-- Telegram & Supabase -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- ربط ملف الستايل الخارجي -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-wrap">
    <header class="app-header">
      <div class="left">
        <h2 id="user-name">تحميل...</h2>
        <div class="status">التعدين: <span id="mining-state" class="active">نشط ●</span></div>
      </div>
      <div class="right">
        <button id="btn-leaderboard" class="icon-btn" title="لوحة المتصدرين">🏆</button>
        <button id="btn-settings" class="icon-btn" title="إعدادات">⚙️</button>
      </div>
    </header>

    <main>
      <section class="balance-card glass">
        <div class="balance-top">
          <p class="muted">الرصيد المتاح للسحب</p>
          <div class="balance-row">
            <h1 id="balance">0.00000000</h1>
            <span class="currency">BTC</span>
          </div>
          <div class="miner-row">
            <div class="miner-icon">⚙️</div>
            <div class="miner-text" id="miner-text">Mining • جاري التعدين</div>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-info">
            <small id="level-text">مستوى 1 • EXP 0/100</small>
            <small id="hash-text">128.5 TH/s</small>
          </div>
          <div class="progress-bar" id="exp-bar">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
        </div>

        <div class="balance-actions">
          <button id="btn-boost" class="main-btn">🚀 Boost 30s</button>
          <button id="btn-daily" class="secondary-btn">🎁 مكافأة يومية</button>
        </div>
      </section>

      <section class="stats-grid">
        <div class="stat-box">
          <span>قوة الهاش</span>
          <p id="hash-power">128.5 TH/s</p>
        </div>
        <div class="stat-box">
          <span>الربح/الساعة (تقديري)</span>
          <p id="hourly-profit">0.00000 BTC</p>
        </div>
        <div class="stat-box">
          <span>السرعة الحالية</span>
          <p id="speed">1x</p>
        </div>
        <div class="stat-box">
          <span>إحالاتك</span>
          <p id="referrals">0</p>
        </div>
      </section>

      <div class="actions-bottom">
        <button class="withdraw-btn" id="btn-withdraw">سحب الأرباح 💳</button>
      </div>

      <section class="leaderboard glass" id="leaderboard" style="display:none;">
        <h3>لوحة المتصدرين</h3>
        <ol id="leader-list"></ol>
      </section>
    </main>

    <footer class="app-footer">
      <small>Cloud Mining Pro • واجهة عرض وهمية للتجربة</small>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
                              </html>
